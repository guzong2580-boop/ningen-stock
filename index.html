<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>닝겐주식 - 실시간 대시보드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0e11;--card:#151921;--card2:#1a1f2b;--border:#252b37;--text:#e8eaed;--sub:#6b7280;--up:#ef4444;--down:#3b82f6;--flat:#6b7280}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* 헤더 */
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0}
.header h1{font-size:17px;font-weight:800;background:linear-gradient(135deg,#ef4444,#f59e0b);background-clip:text;-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-right{display:flex;gap:10px;align-items:center;font-size:11px;color:var(--sub)}
.loading-bar{height:2px;background:var(--card);flex-shrink:0}.loading-bar .bar{height:100%;width:0;background:linear-gradient(90deg,#ef4444,#f59e0b);transition:width .3s}

/* 상단 바 */
.market-bar{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.market-bar::-webkit-scrollbar{height:0}
.mki{display:flex;align-items:center;gap:6px;padding:6px 16px;border-right:1px solid var(--border);font-size:11px;flex-shrink:0}
.mki .ml{color:var(--sub);font-weight:700}.mki .mv{font-weight:700}.mki .mc{font-size:10px}
.up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--flat)}

/* 메인 레이아웃: 뉴스 | 카드 */
.main{display:grid;grid-template-columns:320px 1fr;flex:1;overflow:hidden}

/* 뉴스 패널 */
.news-panel{background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.news-header{padding:10px 14px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border);color:#f59e0b;flex-shrink:0}
.news-list{flex:1;overflow-y:auto;padding:4px 0}
.news-item{display:block;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.03);text-decoration:none;color:var(--text);transition:background .1s}
.news-item:hover{background:var(--card2)}
.news-title{font-size:12px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-meta{font-size:10px;color:var(--sub);margin-top:4px}

/* 카드 영역 */
.dashboard{padding:10px;overflow-y:auto}
.card-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}

/* 컴팩트 카드 */
.sc{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.sc:hover{border-color:#3b4455}
.sc.alert-buy{border-color:#f59e0b;box-shadow:0 0 12px rgba(245,158,11,0.3);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(245,158,11,0.2)}50%{box-shadow:0 0 18px rgba(245,158,11,0.5)}}

.sc-head{display:flex;align-items:center;gap:5px;padding:6px 10px;background:var(--card2);border-bottom:1px solid var(--border)}
.sc-name{font-size:12px;font-weight:700;color:#f3f4f6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.sc-badge{font-size:9px;color:#fff;padding:1px 5px;border-radius:2px;font-weight:600;flex-shrink:0}
.sc-badge.kospi{background:#3b82f6}.sc-badge.kosdaq{background:#f97316}.sc-badge.etf{background:#10b981}
.sc-badge.fx{background:#8b5cf6}.sc-badge.oil{background:#a16207}.sc-badge.metal{background:#d97706}
.sc-badge.commodity{background:#059669}.sc-badge.bond{background:#6366f1}

.sc-body{padding:8px 10px}
.sc-price{font-size:20px;font-weight:800;letter-spacing:-.5px}
.sc-change{font-size:11px;font-weight:600;margin-top:2px}

.sc-info{display:grid;grid-template-columns:1fr 1fr;gap:0;font-size:10px;margin-top:6px;border-top:1px solid rgba(255,255,255,0.04);padding-top:5px}
.sc-info span{display:flex;justify-content:space-between;padding:1px 0}
.sc-info .l{color:var(--sub)}.sc-info .v{font-weight:600;color:#d1d5db}

.sc-chart{height:50px;padding:0 2px}
.sc-chart canvas{width:100%;height:100%}

/* 목표가 */
.sc-target{display:flex;align-items:center;gap:3px;padding:4px 10px;border-top:1px solid var(--border);font-size:10px}
.sc-target label{color:var(--sub)}
.sc-target input{width:70px;padding:2px 5px;border:1px solid var(--border);border-radius:3px;font-size:10px;text-align:right;outline:none;background:rgba(255,255,255,0.04);color:var(--text)}
.sc-target input:focus{border-color:#f59e0b}
.sc-target input.active{border-color:#f59e0b;color:#fbbf24;font-weight:700}
.sc-target .ts{color:#fbbf24;font-weight:700;font-size:9px;display:none;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sc.alert-buy .ts{display:inline}

/* 삭제 버튼 */
.sc-del{display:none;font-size:10px;color:var(--sub);cursor:pointer;padding:0 2px;flex-shrink:0}
.sc-del:hover{color:var(--up)}
.sc-head:hover .sc-del{display:inline}

/* 추가 버튼 */
.btn-add{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--card2);color:var(--text);cursor:pointer;font-size:11px}
.btn-add:hover{border-color:#f59e0b;color:#f59e0b}

/* 추가 모달 */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;width:500px;max-width:90vw;max-height:80vh;display:flex;flex-direction:column}
.modal h2{font-size:15px;margin-bottom:12px}
.modal-search{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-size:12px;outline:none;margin-bottom:10px}
.modal-search:focus{border-color:#f59e0b}
.modal-tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.modal-tab{padding:3px 10px;border-radius:3px;font-size:11px;cursor:pointer;background:var(--card2);color:var(--sub);border:1px solid var(--border)}
.modal-tab.active,.modal-tab:hover{color:#f59e0b;border-color:#f59e0b}
.modal-list{flex:1;overflow-y:auto;max-height:400px}
.modal-item{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:12px;cursor:pointer;border-radius:4px}
.modal-item:hover{background:var(--card2)}
.modal-item.added{opacity:.4}
.modal-item .mi-name{font-weight:600}.modal-item .mi-code{color:var(--sub);font-size:10px;margin-left:6px}
.modal-item .mi-badge{font-size:9px;color:#fff;padding:1px 5px;border-radius:2px}
.modal-close{margin-top:10px;text-align:right}
.modal-close button{padding:5px 14px;border-radius:4px;border:1px solid var(--border);background:var(--card2);color:var(--text);cursor:pointer;font-size:12px}

.toast{position:fixed;bottom:16px;right:16px;background:#1e293b;color:#f1f5f9;border:1px solid #334155;border-radius:6px;padding:10px 18px;font-size:12px;z-index:2000;transform:translateY(60px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a3040;border-radius:3px}

@media(max-width:1600px){.card-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:1200px){.card-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>

<div class="header">
  <h1>닝겐주식</h1>
  <div class="header-right">
    <button class="btn-add" onclick="openAdd()">+ 종목추가</button>
    <span id="refreshTimer"></span><span>30초 자동갱신</span>
  </div>
</div>
<div class="loading-bar"><div class="bar" id="loadBar"></div></div>

<div class="market-bar">
  <div class="mki"><span class="ml">KOSPI</span><span class="mv" id="mk_kospi">-</span><span class="mc" id="mk_kospi_c"></span></div>
  <div class="mki"><span class="ml">KOSDAQ</span><span class="mv" id="mk_kosdaq">-</span><span class="mc" id="mk_kosdaq_c"></span></div>
  <div class="mki"><span class="ml">DOW</span><span class="mv" id="mk_dow">-</span><span class="mc" id="mk_dow_c"></span></div>
  <div class="mki"><span class="ml">NASDAQ</span><span class="mv" id="mk_nasdaq">-</span><span class="mc" id="mk_nasdaq_c"></span></div>
  <div class="mki"><span class="ml">S&P500</span><span class="mv" id="mk_sp500">-</span><span class="mc" id="mk_sp500_c"></span></div>
</div>

<div class="main">
  <div class="news-panel">
    <div class="news-header">최신 경제 뉴스</div>
    <div class="news-list" id="newsList">
      <div style="padding:40px;text-align:center;color:var(--sub);font-size:12px">뉴스 불러오는 중...</div>
    </div>
  </div>
  <div class="dashboard">
    <div class="card-grid" id="cardGrid"></div>
  </div>
</div>

<div class="modal-bg" id="addModal">
  <div class="modal">
    <h2>종목 추가</h2>
    <input type="text" class="modal-search" id="addSearch" placeholder="종목명 또는 코드 검색..." oninput="filterAdd()">
    <div class="modal-tabs" id="addTabs"></div>
    <div class="modal-list" id="addList"></div>
    <div class="modal-close"><button onclick="closeAdd()">닫기</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>

  {c:'373220',n:'LG에너지솔루션',y:'373220.KS',m:'kospi',t:'코스피'},
  {c:'207940',n:'삼성바이오로직스',y:'207940.KS',m:'kospi',t:'코스피'},
  {c:'005490',n:'POSCO홀딩스',y:'005490.KS',m:'kospi',t:'코스피'},
  {c:'055550',n:'신한지주',y:'055550.KS',m:'kospi',t:'코스피'},
  {c:'105560',n:'KB금융',y:'105560.KS',m:'kospi',t:'코스피'},
  {c:'015760',n:'한국전력',y:'015760.KS',m:'kospi',t:'코스피'},

  {c:'042700',n:'한미반도체',y:'042700.KS',m:'kospi',t:'코스피'},
  {c:'329180',n:'HD현대중공업',y:'329180.KS',m:'kospi',t:'코스피'},
  {c:'247540',n:'에코프로비엠',y:'247540.KQ',m:'kosdaq',t:'코스닥'},
  // 환율
  {c:'USDKRW',n:'달러/원',y:'KRW=X',m:'fx',t:'환율'},
  {c:'JPYKRW',n:'엔/원(100엔)',y:'JPYKRW=X',m:'fx',t:'환율'},
  {c:'EURKRW',n:'유로/원',y:'EURKRW=X',m:'fx',t:'환율'},
  {c:'CNYKRW',n:'위안/원',y:'CNYKRW=X',m:'fx',t:'환율'},
  {c:'USDJPY',n:'달러/엔',y:'JPY=X',m:'fx',t:'환율'},
  {c:'EURUSD',n:'유로/달러',y:'EURUSD=X',m:'fx',t:'환율'},
  {c:'GBPUSD',n:'파운드/달러',y:'GBPUSD=X',m:'fx',t:'환율'},

  // 유가
  {c:'WTI',n:'WTI 원유',y:'CL=F',m:'oil',t:'유가'},
  {c:'BRENT',n:'브렌트유',y:'BZ=F',m:'oil',t:'유가'},
  {c:'NATGAS',n:'천연가스',y:'NG=F',m:'oil',t:'유가'},

  // 금
  {c:'GOLD',n:'국제금',y:'GC=F',m:'metal',t:'금'},
  {c:'SILVER',n:'국제은',y:'SI=F',m:'metal',t:'금'},
  {c:'PLAT',n:'백금',y:'PL=F',m:'metal',t:'금'},
  {c:'PALL',n:'팔라듐',y:'PA=F',m:'metal',t:'금'},
  // 원자재
  {c:'COPPER',n:'구리',y:'HG=F',m:'commodity',t:'원자재'},
  {c:'CORN',n:'옥수수',y:'ZC=F',m:'commodity',t:'원자재'},

  {c:'US10Y',n:'미국채 10년',y:'^TNX',m:'bond',t:'금리'},
  {c:'US2Y',n:'미국채 2년',y:'^IRX',m:'bond',t:'금리'},
  {c:'US30Y',n:'미국채 30년',y:'^TYX',m:'bond',t:'금리'},
  {c:'VIX',n:'VIX 공포지수',y:'^VIX',m:'bond',t:'지수'},

/* ========== 기본 종목 (최초 로드 시) ========== */
const DEFAULT_CODES = [
  '002810','003800','005930','000660','329750','025000',
  '072870','036800','066620','143240','067280',
  'USDKRW','JPYKRW','EURKRW','CNYKRW','USDJPY','EURUSD','GBPUSD','DXY',
  'WTI','BRENT','NATGAS','GASOL',
  'GOLD','SILVER','PLAT','PALL',
  'COPPER','CORN','WHEAT','SOY',
  'US10Y','US2Y','US30Y','VIX',
];

/* ========== 관심종목 (localStorage) ========== */
let W = [];
function loadW() {
  const s = localStorage.getItem('ningen_wl');
  if (s) { W = JSON.parse(s); }
  else { W = DEFAULT_CODES.map(c => DB.find(d => d.c === c)).filter(Boolean); saveW(); }
}
function saveW() { localStorage.setItem('ningen_wl', JSON.stringify(W)); }

function addItem(code) {
  if (W.find(x => x.c === code)) return;
  const item = DB.find(d => d.c === code);
  if (!item) return;
  W.push(item);
  saveW();
  renderCards();
  refreshAll();
  toast(item.n + ' 추가됨');
}
function removeItem(code, e) {
  e.stopPropagation();
  const item = W.find(x => x.c === code);
  W = W.filter(x => x.c !== code);
  saveW();
  renderCards();
  toast((item?.n || code) + ' 삭제됨');
}

/* ========== 추가 모달 ========== */
const CATS = {전체:'', 주식:'kospi,kosdaq,etf', 환율:'fx', 유가:'oil', 금:'metal', 원자재:'commodity', 금리:'bond'};
let addCat = '전체';

function openAdd() {
  document.getElementById('addModal').classList.add('show');
  document.getElementById('addSearch').value = '';
  addCat = '전체';
  renderAddTabs();
  filterAdd();
  document.getElementById('addSearch').focus();
}
function closeAdd() { document.getElementById('addModal').classList.remove('show'); }

function renderAddTabs() {
  document.getElementById('addTabs').innerHTML = Object.keys(CATS).map(k =>
    `<div class="modal-tab${addCat===k?' active':''}" onclick="addCat='${k}';renderAddTabs();filterAdd()">${k}</div>`
  ).join('');
}

function filterAdd() {
  const q = document.getElementById('addSearch').value.toLowerCase();
  const markets = CATS[addCat] ? CATS[addCat].split(',') : null;
  const filtered = DB.filter(d => {
    if (markets && !markets.includes(d.m)) return false;
    if (q && !d.n.toLowerCase().includes(q) && !d.c.toLowerCase().includes(q)) return false;
    return true;
  });
  const el = document.getElementById('addList');
  el.innerHTML = filtered.map(d => {
    const added = W.find(x => x.c === d.c);
    return `<div class="modal-item${added?' added':''}" onclick="${added?'':`addItem('${d.c}');filterAdd()`}">
      <span><span class="mi-name">${d.n}</span><span class="mi-code">${d.c}</span></span>
      <span class="mi-badge sc-badge ${d.m}">${added?'추가됨':d.t}</span>
    </div>`;
  }).join('');
}

const MKT={kospi:'^KS11',kosdaq:'^KQ11',dow:'^DJI',nasdaq:'^IXIC',sp500:'^GSPC'};
let cc={},tgt={};
const isDec=s=>['fx','oil','metal','commodity','bond'].includes(s.m);

function loadTgt(){const s=localStorage.getItem('ningen_tgt');if(s)tgt=JSON.parse(s);}
function saveTgt(){localStorage.setItem('ningen_tgt',JSON.stringify(tgt));}
function setTgt(c){const i=document.getElementById('t_'+c);const v=parseFloat(i.value.replace(/,/g,''));if(v>0){tgt[c]=v;i.classList.add('active');}else{delete tgt[c];i.classList.remove('active');document.getElementById('card_'+c)?.classList.remove('alert-buy');}saveTgt();}

window.addEventListener('DOMContentLoaded',()=>{loadW();loadTgt();renderCards();refreshAll();fetchNews();setInterval(refreshAll,30000);setInterval(fetchNews,120000);});

async function fetchPrices(syms){try{const r=await fetch('/api/price?symbols='+syms.join(','));return await r.json();}catch(e){return {};}}
async function fetchCharts(syms){
  const need=syms.filter(s=>!cc[s]);
  if(!need.length) return;
  try{const r=await fetch('/api/charts?symbols='+need.join(','));const d=await r.json();Object.entries(d).forEach(([k,v])=>{cc[k]=v;});}catch(e){}
}

/* 뉴스 */
async function fetchNews(){
  try{
    const r=await fetch('/api/news');const data=await r.json();
    const el=document.getElementById('newsList');
    if(!data.length){el.innerHTML='<div style="padding:20px;color:var(--sub);font-size:12px;text-align:center">뉴스 없음</div>';return;}
    el.innerHTML=data.map(a=>{
      const ago=timeAgo(a.pub);
      return `<a class="news-item" href="${a.link}" target="_blank" rel="noopener">
        <div class="news-title">${a.title}</div>
        <div class="news-meta">${a.source||''} ${ago}</div>
      </a>`;
    }).join('');
  }catch(e){console.error(e);}
}
function timeAgo(s){
  if(!s)return'';
  const d=new Date(s),now=new Date(),diff=Math.floor((now-d)/60000);
  if(diff<1)return'방금';if(diff<60)return diff+'분 전';
  if(diff<1440)return Math.floor(diff/60)+'시간 전';
  return Math.floor(diff/1440)+'일 전';
}

/* 카드 */
function renderCards(){
  document.getElementById('cardGrid').innerHTML=W.map(s=>`
    <div class="sc" id="card_${s.c}">
      <div class="sc-head">
        <span class="sc-name">${s.n}</span>
        <span class="sc-badge ${s.m}">${s.t}</span>
        <span class="sc-del" onclick="removeItem('${s.c}',event)" title="삭제">✕</span>
      </div>
      <div class="sc-body">
        <div class="sc-price flat" id="p_${s.c}">-</div>
        <div class="sc-change flat" id="ch_${s.c}"></div>
        <div class="sc-info">
          <span><i class="l">시가</i><i class="v" id="o_${s.c}">-</i></span>
          <span><i class="l">전일</i><i class="v" id="pc_${s.c}">-</i></span>
          <span><i class="l">고가</i><i class="v up" id="h_${s.c}">-</i></span>
          <span><i class="l">저가</i><i class="v down" id="l_${s.c}">-</i></span>
        </div>
      </div>
      <div class="sc-chart"><canvas id="cv_${s.c}"></canvas></div>
      <div class="sc-target">
        <span class="ts" id="ts_${s.c}">도달!</span>
        <label>목표</label>
        <input type="text" class="${tgt[s.c]?'active':''}" id="t_${s.c}" value="${tgt[s.c]||''}" placeholder="-" onchange="setTgt('${s.c}')" onkeydown="if(event.key==='Enter')this.blur()">
      </div>
    </div>
  `).join('');
}

function upd(c,p){
  if(!p||p.error)return;
  const s=W.find(x=>x.c===c);
  const cls=p.change>0?'up':p.change<0?'down':'flat';
  const sign=p.change>0?'+':'';
  const arrow=p.change>0?'▲':p.change<0?'▼':'';
  const dec=isDec(s)?2:0;
  const f=v=>v?(dec?Number(v).toFixed(dec):Number(v).toLocaleString()):'-';

  const pe=document.getElementById('p_'+c);
  if(pe){pe.textContent=f(p.price);pe.className='sc-price '+cls;}
  const ce=document.getElementById('ch_'+c);
  if(ce){ce.textContent=`${arrow} ${f(Math.abs(p.change))} (${sign}${p.changeRate}%)`;ce.className='sc-change '+cls;}

  st('o_'+c,f(p.open));st('pc_'+c,f(p.prevClose));st('h_'+c,f(p.high));st('l_'+c,f(p.low));

  const card=document.getElementById('card_'+c);
  if(card&&tgt[c]&&p.price>0){
    if(p.price<=tgt[c]){if(!card.classList.contains('alert-buy')){card.classList.add('alert-buy');toast((s?.n||c)+' 목표가 도달!');}}
    else card.classList.remove('alert-buy');
  }
}
function st(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}

/* 상단 바 */
function upMk(id,p){
  if(!p||p.error)return;
  const v=document.getElementById('mk_'+id),c=document.getElementById('mk_'+id+'_c');if(!v)return;
  v.textContent=Number(p.price).toFixed(2);
  const sign=p.change>0?'+':'',cls=p.change>0?'up':p.change<0?'down':'flat';
  c.textContent=`${sign}${Number(p.change).toFixed(2)} (${sign}${p.changeRate}%)`;
  c.className='mc '+cls;v.className='mv '+cls;
}

/* 차트 */
function drawChart(c,data){
  const prices=data.closes;if(!prices||prices.length<2)return;
  const canvas=document.getElementById('cv_'+c);if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  ctx.scale(dpr,dpr);
  const WW=rect.width,H=rect.height;
  const pad={top:4,right:4,bottom:2,left:4};
  const cw=WW-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  const minP=Math.min(...prices),maxP=Math.max(...prices),rng=maxP-minP||1;
  ctx.clearRect(0,0,WW,H);

  const isUp=prices[prices.length-1]>=prices[0];
  ctx.beginPath();ctx.strokeStyle=isUp?'#ef4444':'#3b82f6';ctx.lineWidth=1.2;
  prices.forEach((v,i)=>{
    const x=pad.left+(i/(prices.length-1))*cw;
    const y=pad.top+ch-((v-minP)/rng)*ch;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();

  ctx.lineTo(pad.left+cw,pad.top+ch);ctx.lineTo(pad.left,pad.top+ch);ctx.closePath();
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,isUp?'rgba(239,68,68,0.12)':'rgba(59,130,246,0.12)');
  grad.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=grad;ctx.fill();
}

/* 갱신 - 배치별 점진 로딩 */
function chunk(arr,size){const r=[];for(let i=0;i<arr.length;i+=size)r.push(arr.slice(i,i+size));return r;}

async function refreshAll(){
  const bar=document.getElementById('loadBar');bar.style.width='5%';

  // 배치별로 나눠서 요청 (10개씩) - 먼저 도착한 배치부터 화면에 바로 반영
  const allItems=[...W];
  const mktSyms=Object.values(MKT);
  const batches=chunk(allItems,10);
  const total=batches.length+1;
  let done=0;

  // 시장지표 (작은 요청이라 먼저)
  const md=await fetchPrices(mktSyms);
  Object.entries(MKT).forEach(([id,sym])=>upMk(id,md[sym]));
  done++;bar.style.width=Math.round(done/total*80)+'%';

  // 종목 배치별 병렬 → 각 배치가 오면 즉시 렌더
  for(const batch of batches){
    const syms=batch.map(s=>s.y);
    const ad=await fetchPrices(syms);
    batch.forEach(s=>upd(s.c,ad[s.y]));
    done++;bar.style.width=Math.round(done/total*80)+'%';
  }

  // 차트 (캐시 안 된 것만, 병렬)
  bar.style.width='85%';
  await fetchCharts(W.map(s=>s.y));
  W.forEach(s=>{if(cc[s.y])drawChart(s.c,cc[s.y]);});

  bar.style.width='100%';setTimeout(()=>{bar.style.width='0';},400);
  document.getElementById('refreshTimer').textContent='갱신 '+new Date().toLocaleTimeString('ko-KR');
}

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show';setTimeout(()=>el.classList.remove('show'),2500);}
</script>
